name: RSINotify Cron

on:
  schedule:
    # 09:15 IST (03:45 UTC)
    - cron: "45 3 * * 1-5"
    # Every 15 min from 09:30 IST through 15:15 IST (04:00–09:45 UTC)
    - cron: "*/15 4-9 * * 1-5"
    # 15:30 IST (10:00 UTC)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python main.py
